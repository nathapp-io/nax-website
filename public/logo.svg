<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 22" fill="none">
  <!-- C-bracket arms stop at x=12; ">" starts at x=15 — 3px gap -->
  <path d="M12,3 L3,3 L3,19 L12,19"
    stroke="black" stroke-width="1.7"
    stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M15,5 L20,11 L15,17"
    stroke="black" stroke-width="1.7"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- nax wordmark -->
  <text
    x="25" y="11"
    dominant-baseline="central"
    font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace"
    font-size="14" font-weight="700"
    fill="black" letter-spacing="-0.5"
  >nax</text>
</svg>
